<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Notre Roulette ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #0a0608;
    --surface:   #130b0e;
    --card:      #1c1016;
    --red:       #8b1a2a;
    --red-deep:  #5c0f1b;
    --red-glow:  #c0273d;
    --gold:      #c9a84c;
    --gold-soft: #e6c97a;
    --rose:      #d4607a;
    --text:      #f0e6e9;
    --muted:     #7d6368;
    --border:    rgba(201,168,76,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ─── CANVAS PARTICLES ─── */
  #particles {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ─── SHARED ─── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity .6s ease, transform .6s ease;
  }
  .screen.hidden {
    opacity: 0; pointer-events: none; transform: scale(.96);
  }

  /* ─── LOCK SCREEN ─── */
  #lock-screen {
    background: radial-gradient(ellipse at 50% 30%, #2a0b13 0%, #0a0608 70%);
  }

  .lock-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 8vw, 3.4rem);
    font-weight: 300;
    letter-spacing: .12em;
    color: var(--gold-soft);
    text-shadow: 0 0 40px rgba(201,168,76,.35);
    margin-bottom: .3rem;
    text-align: center;
  }
  .lock-subtitle {
    font-size: .72rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3rem;
  }

  .lock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.4rem 2rem;
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; align-items: center; gap: 1.4rem;
    box-shadow: 0 8px 60px rgba(139,26,42,.2), 0 2px 0 rgba(201,168,76,.08) inset;
  }

  .lock-hint {
    font-size: .7rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* PIN dots */
  .pin-dots {
    display: flex; gap: 1rem;
  }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: transparent;
    transition: background .2s, transform .15s;
  }
  .pin-dot.filled {
    background: var(--gold);
    transform: scale(1.15);
    box-shadow: 0 0 10px rgba(201,168,76,.5);
  }

  /* Numpad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .75rem;
    width: 100%;
  }
  .numpad-btn {
    aspect-ratio: 1;
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 14px;
    background: rgba(255,255,255,.03);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .numpad-btn:active { transform: scale(.92); background: rgba(201,168,76,.1); }
  .numpad-btn.del { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; color: var(--muted); }
  .numpad-btn.zero { grid-column: 2; }

  .lock-error {
    font-size: .7rem;
    letter-spacing: .1em;
    color: var(--rose);
    min-height: 1em;
    transition: opacity .3s;
  }
  .lock-error.invisible { opacity: 0; }

  /* ─── MAIN SCREEN ─── */
  #main-screen {
    background: radial-gradient(ellipse at 50% 0%, #1f070f 0%, #0a0608 65%);
    gap: 0;
  }

  .main-inner {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
  }

  .main-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    font-weight: 300;
    letter-spacing: .14em;
    color: var(--gold-soft);
    text-shadow: 0 0 30px rgba(201,168,76,.3);
    margin-bottom: .25rem;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto .9rem;
  }

  .intro-text {
    font-size: .78rem;
    font-weight: 300;
    letter-spacing: .06em;
    line-height: 1.8;
    color: var(--muted);
    text-align: center;
    padding: 0 .5rem;
    margin-bottom: 2.2rem;
  }

  /* Big launch button */
  .btn-launch {
    position: relative;
    width: 172px; height: 172px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at 40% 35%, #c0273d 0%, #8b1a2a 45%, #4a0d18 100%);
    box-shadow:
      0 0 0 1px rgba(201,168,76,.25),
      0 0 30px rgba(139,26,42,.6),
      0 0 80px rgba(139,26,42,.25),
      inset 0 1px 0 rgba(255,200,200,.12);
    color: var(--gold-soft);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: .12em;
    text-transform: uppercase;
    transition: transform .2s, box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 2.6rem;
    overflow: hidden;
  }
  .btn-launch::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,255,255,.12) 0%, transparent 65%);
  }
  .btn-launch::after {
    content: '';
    position: absolute;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    background: conic-gradient(transparent 0deg, rgba(201,168,76,.15) 60deg, transparent 120deg);
    animation: spin-glow 6s linear infinite;
    border-radius: 50%;
  }
  @keyframes spin-glow { to { transform: rotate(360deg); } }

  .btn-launch:active { transform: scale(.94); box-shadow: 0 0 20px rgba(139,26,42,.5); }
  .btn-launch:hover { transform: scale(1.03); box-shadow: 0 0 0 1px rgba(201,168,76,.4), 0 0 50px rgba(192,39,61,.7), 0 0 100px rgba(139,26,42,.3), inset 0 1px 0 rgba(255,200,200,.15); }

  .btn-launch span { position: relative; z-index: 1; }

  /* Result card */
  .result-wrap {
    width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 1.6rem;
    transition: opacity .4s ease, transform .4s ease;
  }
  .result-wrap.hidden-result {
    opacity: 0; transform: translateY(8px); pointer-events: none;
  }

  .result-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.8rem 1.6rem;
    text-align: center;
    box-shadow: 0 4px 40px rgba(139,26,42,.15), 0 1px 0 rgba(201,168,76,.06) inset;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: .6;
  }

  .result-label {
    font-size: .62rem;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .9rem;
  }
  .result-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.15rem, 4.5vw, 1.45rem);
    font-weight: 400;
    font-style: italic;
    line-height: 1.55;
    color: var(--text);
    text-shadow: 0 1px 20px rgba(201,168,76,.1);
  }

  .btn-relaunch {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: .8rem 2.2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background .2s, border-color .2s, color .2s, transform .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-relaunch:hover {
    background: rgba(201,168,76,.08);
    border-color: rgba(201,168,76,.45);
  }
  .btn-relaunch:active { transform: scale(.95); }

  /* Petal / deco corner */
  .deco {
    position: fixed;
    font-size: 1rem;
    color: rgba(201,168,76,.08);
    pointer-events: none;
    user-select: none;
  }
  .deco-tl { top: 1.5rem; left: 1.5rem; }
  .deco-br { bottom: 1.5rem; right: 1.5rem; transform: rotate(180deg); }

  /* ─── FADE IN UTIL ─── */
  .fade-in {
    animation: fadeIn .5s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── SHAKE ─── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake .35s ease; }

  /* ─── SCROLL for very small screens ─── */
  @media (max-height: 640px) {
    #main-screen { overflow-y: auto; justify-content: flex-start; padding-top: 2.5rem; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- DECO CORNERS -->
<div class="deco deco-tl">✦ ✦ ✦</div>
<div class="deco deco-br">✦ ✦ ✦</div>

<!-- ═══════════════ LOCK SCREEN ═══════════════ -->
<div class="screen" id="lock-screen">
  <p class="lock-logo">Notre Roulette</p>
  <p class="lock-subtitle">Espace privé</p>

  <div class="lock-card">
    <p class="lock-hint">Code d'accès</p>

    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="numpad" id="numpad">
      <button class="numpad-btn" data-n="1">1</button>
      <button class="numpad-btn" data-n="2">2</button>
      <button class="numpad-btn" data-n="3">3</button>
      <button class="numpad-btn" data-n="4">4</button>
      <button class="numpad-btn" data-n="5">5</button>
      <button class="numpad-btn" data-n="6">6</button>
      <button class="numpad-btn" data-n="7">7</button>
      <button class="numpad-btn" data-n="8">8</button>
      <button class="numpad-btn" data-n="9">9</button>
      <button class="numpad-btn del" data-n="del">⌫</button>
      <button class="numpad-btn zero" data-n="0">0</button>
    </div>

    <p class="lock-error invisible" id="lock-error">Code incorrect</p>
  </div>
</div>

<!-- ═══════════════ MAIN SCREEN ═══════════════ -->
<div class="screen hidden" id="main-screen">
  <div class="main-inner">
    <p class="main-logo">Notre Roulette ❤️</p>
    <div class="divider"></div>
    <p class="intro-text">
      À faire au minimum trois fois par semaine.<br/>
      Tu peux tourner autant de fois que tu veux.<br/>
      Amuse-toi bien&nbsp;❤️
    </p>

    <button class="btn-launch" id="btn-launch">
      <span>Tourner<br/>la roulette</span>
    </button>

    <div class="result-wrap hidden-result" id="result-wrap">
      <div class="result-card" id="result-card">
        <p class="result-label">Ce soir…</p>
        <p class="result-text" id="result-text"></p>
      </div>
      <button class="btn-relaunch" id="btn-relaunch">↺ &nbsp;Relancer</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────── OPTIONS ─────────────────── */
const options = [
  "Surprend moi",
  "Va sous le bureau et finis moi 😏",
  "Quand tu veux dans la journée",
  "Ce soir tu te mets caliente",
  "Demande moi de te faire un cunni jusqu'au bout grrr",
  "Chauffe moi",
  "Demain matin au réveil fais ce que tu veux",
  "Viens dans le bureau et fais un show pour que je te rejoigne dans la chambre",
  "Exige un cunni",
  "Essaye de me faire jouir",
  "Je dois te faire jouir",
  "Le faire dans la piscine 💦",
  "Tenu sexy obligatoire",
  "Sous-vêtements sexy pour me rendre fou",
  "Lingerie sexy",
  "Commence par aller sous le bureau la suite au feeling",
  "Commence par m'embrasser dans le cou",
  "Met un film/série que nous n'allons pas terminer 🍑",
  "Grimpe sur moi",
  "On doit le faire dehors",
  "On doit le faire sous la douche",
  "Anal ? Bon ok t'as le droit de changer 😝 (À faire quand même en douceur, ce serait cool)",
  "Commence par me masser et laisse tes mains, ton corps, ta bouche aller un peu partout",
  "Demande un massage et au milieu tu vois si tu veux plus 😉",
  "Chuchote moi à l'oreille ce que tu veux que je te fasse",
  "Une gorge profonde ça fait longtemps",
  "Un peu de vibro pour entendre ton vibrato 🎤",
  "Soirée BDSM",
  "Demande moi de t'attacher et je fais ce que tu veux",
  "Attache moi et fais ce que tu veux",
  "MD seulement si c'est le bon moment pour toi et moi",
  "Coke seulement si c'est le bon moment pour toi et moi",
  "Ce soir on fait plein de moments hot éparpillés sur toute la soirée",
  "MarathonSex !",
  "Embrasse moi et la suite au feeling",
  "Bande moi les yeux et fait moi sentir des choses",
  "Bande toi les yeux et redécouvre",
  "3 nouvelles positions à tester",
  "Faisons basique et rapide",
  "Le premier qui jouit perd — on doit tout donner",
  "Un petit 69 ça a jamais fait de mal",
  "Juste des prélis",
  "Prélis : le premier à jouir a perdu",
  "Passe sous le bureau pendant que je te travaille ou joue, et fais ce que tu veux avec ta bouche",
  "Contrôle total 20min : je ou tu donnes des ordres précis, je ou tu obéis sans discuter 👀 (Choisis toi ou moi selon feeling)",
  "Dans la voiture ça fait longtemps",
  "Quand je roule sans prévenir tu descends et récompense ton chauffeur privé du trajet 👅",
  "Fellation surprise : quand je m'y attends le moins, tu te mets à genoux et tu commences (peu importe où !)",
  "Cunnilingus surprise demandé : je te rejoins où tu es et je m'y mets sans préambule 👅",
  "Jeu de température : glaçon + zone érogène grrr (Toi ou moi peu importe)",
  "On doit tenir le plus longtemps possible sans jouir et en donnant le maximum — pas de triche",
  "Une fellation finition suivie d'une bonne partie de jambes en l'air",
  "Tu dois me dire baise moi plus fort à chaque fois que je ralentis",
  "Tu dois venir sur mon visage et gérer le rythme de ton cunni d'enfer",
  "Dans le jardin",
  "Dans une forêt",
  "Ce que tu veux",
  "Faisons 2/3 trucs dans la piscine",
  "Dans un ascenseur 👀"
];

/* ─────────────────── LOCK ─────────────────── */
const CODE = "1825";
let pin = "";

const pinDots  = document.querySelectorAll('.pin-dot');
const errEl    = document.getElementById('lock-error');
const lockEl   = document.getElementById('lock-screen');
const mainEl   = document.getElementById('main-screen');

function updateDots() {
  pinDots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
}

function showError(msg) {
  errEl.textContent = msg;
  errEl.classList.remove('invisible');
  const card = document.querySelector('.lock-card');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  setTimeout(() => {
    errEl.classList.add('invisible');
    card.classList.remove('shake');
  }, 1800);
}

function unlock() {
  lockEl.classList.add('hidden');
  mainEl.classList.remove('hidden');
}

function handleKey(k) {
  if (k === 'del') {
    pin = pin.slice(0, -1);
    updateDots();
    return;
  }
  if (pin.length >= 4) return;
  pin += k;
  updateDots();
  if (pin.length === 4) {
    if (pin === CODE) {
      setTimeout(unlock, 200);
    } else {
      setTimeout(() => { showError("Code incorrect"); pin = ""; updateDots(); }, 150);
    }
  }
}

document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.numpad-btn');
  if (btn) handleKey(btn.dataset.n);
});

/* ─────────────────── ROULETTE ─────────────────── */
let lastIdx = -1;

function pickRandom() {
  let idx;
  do { idx = Math.floor(Math.random() * options.length); } while (idx === lastIdx && options.length > 1);
  lastIdx = idx;
  return options[idx];
}

const resultWrap = document.getElementById('result-wrap');
const resultText = document.getElementById('result-text');
const btnLaunch  = document.getElementById('btn-launch');
const btnRelaunch= document.getElementById('btn-relaunch');

function reveal() {
  const choice = pickRandom();
  resultWrap.classList.remove('hidden-result');
  resultText.classList.remove('fade-in');
  void resultText.offsetWidth;
  resultText.textContent = choice;
  resultText.classList.add('fade-in');
}

btnLaunch.addEventListener('click', reveal);
btnRelaunch.addEventListener('click', () => {
  resultText.classList.remove('fade-in');
  void resultText.offsetWidth;
  resultText.classList.add('fade-in');
  resultText.textContent = pickRandom();
});

/* ─────────────────── PARTICLES ─────────────────── */
(function() {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, pts = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COLORS = ['rgba(201,168,76,', 'rgba(192,39,61,', 'rgba(212,96,122,'];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function init() {
    pts = [];
    const N = Math.min(55, Math.floor(W * H / 18000));
    for (let i = 0; i < N; i++) pts.push({
      x: rand(0, W), y: rand(0, H),
      r: rand(.6, 1.8),
      vx: rand(-.12, .12), vy: rand(-.18, -.06),
      a: rand(.25, .7),
      c: COLORS[Math.floor(Math.random() * COLORS.length)],
      life: rand(0, 1), speed: rand(.002, .005)
    });
  }
  init();

  function frame() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.life += p.speed;
      if (p.life > 1) { p.life = 0; p.x = rand(0, W); p.y = H + 10; }
      const alpha = p.a * Math.sin(p.life * Math.PI);
      ctx.beginPath();
      ctx.arc(p.x + Math.sin(p.life * 6) * 8, p.y - p.life * H * .7, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.c + alpha + ')';
      ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
